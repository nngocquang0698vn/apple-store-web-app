services:
  mysql:
    image: mysql:8.4
    container_name: apple-store-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: apple_store
      MYSQL_USER: apple_store
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root_secret
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot_secret"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apple-store-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:80"
    env_file:
      - .env
    environment:
      # Chỉ override kết nối DB tới service mysql (các biến khác lấy từ .env).
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: apple_store
      DB_USERNAME: apple_store
      DB_PASSWORD: secret
    volumes:
      - ./.env:/var/www/html/.env
      - ./storage:/var/www/html/storage

volumes:
  mysql_data:
    name: apple_store_mysql_data
