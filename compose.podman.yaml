# Tuỳ chọn: chỉ dùng với Podman trên Linux khi gặp lỗi quyền / SELinux với bind mount.
#
#   podman compose -f compose.yaml -f compose.podman.yaml up -d --build
#
# Không dùng file này với Docker Desktop (Mac/Windows).

services:
  app:
    userns_mode: keep-id
    volumes:
      - ./.env:/var/www/html/.env:Z
      - ./storage:/var/www/html/storage:Z
      - ./bootstrap/cache:/var/www/html/bootstrap/cache:Z
